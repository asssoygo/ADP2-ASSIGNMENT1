services:
  # -------------------- DATABASES --------------------

  order-db:
    image: postgres
    container_name: order-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: order_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  payment-db:
    image: postgres
    container_name: payment-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: payment_db
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # -------------------- RABBITMQ --------------------

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -------------------- SERVICES --------------------

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    restart: on-failure
    depends_on:
      payment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8081:8081"
      - "50051:50051"
    environment:
      PAYMENT_DB_URL: postgres://postgres:123@payment-db:5432/payment_db?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PORT: "8081"
      GRPC_PORT: "50051"

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    depends_on:
      order-db:
        condition: service_healthy
      payment-service:
        condition: service_started
    ports:
      - "8080:8080"
      - "50052:50052"
    environment:
      ORDER_DB_URL: postgres://postgres:123@order-db:5432/order_db?sslmode=disable
      PAYMENT_GRPC_ADDR: payment-service:50051
      PORT: "8080"
      ORDER_GRPC_PORT: "50052"

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    restart: on-failure
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      HTTP_PORT: "8082"
